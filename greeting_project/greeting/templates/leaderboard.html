<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .nav-links {
            margin-bottom: 20px;
        }

        .nav-links a {
            margin-right: 15px;
        }

        table {
            border-collapse: collapse;
            width: 550px;
            max-width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        .error {
            color: red;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Top 10 Leaderboard</h1>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
    </div>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <table>
        <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Best Score</th>
        </tr>

        {% for player in leaderboard %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>
                <a href="/player/{{ player.player_name }}/">
                    {{ player.player_name }}
                </a>
            </td>
            <td>{{ player.best_score }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No scores found.</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
